<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pregunta Especial 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Lato', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9eb5, #ffd6e0, #ffb3c6);
    background-size: 300% 300%;
    animation: bgMove 6s ease infinite;
    overflow: hidden;
}
@keyframes bgMove {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}
.card {
    background: white;
    padding: 45px 40px;
    border-radius: 28px;
    text-align: center;
    box-shadow: 0 15px 50px rgba(255,79,129,0.25);
    width: 340px;
    position: relative;
}
.heart-icon {
    font-size: 60px;
    display: block;
    margin-bottom: 15px;
    animation: heartbeat 1.8s infinite;
}
@keyframes heartbeat {
    0%,100% { transform: scale(1); }
    15%,35% { transform: scale(1.15); }
    25% { transform: scale(1); }
}
.name {
    font-family: 'Dancing Script', cursive;
    color: #ff4f81;
    font-size: 1.2rem;
    margin-bottom: 6px;
    opacity: 0.8;
}
h1 {
    font-family: 'Dancing Script', cursive;
    color: #ff4f81;
    font-size: 2rem;
    margin-bottom: 28px;
    line-height: 1.3;
}
.buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
}
button {
    border: none;
    padding: 13px 30px;
    border-radius: 50px;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.3s;
    font-family: 'Lato', sans-serif;
}
.yes {
    background: #ff4f81;
    color: white;
    box-shadow: 0 6px 20px rgba(255,79,129,0.4);
}
.yes:hover { transform: scale(1.07); }
.no {
    background: #f0f0f0;
    color: #999;
    position: absolute;
}
.letter {
    display: none;
    margin-top: 24px;
    background: #fff0f5;
    padding: 20px;
    border-radius: 16px;
    color: #555;
    font-size: 0.98rem;
    line-height: 1.7;
    animation: fade 0.7s ease;
    border-left: 3px solid #ff4f81;
}
@keyframes fade {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
}
/* Corazones flotantes */
.fh {
    position: fixed;
    font-size: 26px;
    pointer-events: none;
    animation: floatUp 3.5s ease-in forwards;
    z-index: 999;
}
@keyframes floatUp {
    0%   { opacity:0; transform:translateY(0) scale(0.5); }
    10%  { opacity:1; transform:scale(1); }
    90%  { opacity:1; }
    100% { opacity:0; transform:translateY(-90vh) scale(0.8); }
}
</style>
</head>
<body>
<div class="card">
    <span class="heart-icon">💝</span>
    <div class="name">Marlyn Ivanna Ayala Holguín</div>
    <h1>¿Puedo ser<br>tu novio? 💖</h1>
    <div class="buttons">
        <button class="yes" onclick="mostrarCarta()">Sí 💘</button>
        <button class="no" id="btnNo" onmouseover="escapar()" onclick="escapar()">No 🥺</button>
    </div>
    <div class="letter" id="carta">
        Desde que hablo contigo, haces mis días más bonitos.<br><br>
        Me gusta tu forma de ser, tu sonrisa y cómo logras alegrarme sin intentarlo.<br><br>
        Así que… me harías muy feliz si me dejas ser tu novio 💕
    </div>
</div>

<script>
function mostrarCarta() {
    document.getElementById("carta").style.display = "block";
    lanzarCorazones();
    setTimeout(lanzarCorazones, 800);
}

function lanzarCorazones() {
    const emojis = ['❤️','💕','💖','💗','🌹'];
    for (let i = 0; i < 8; i++) {
        const h = document.createElement('div');
        h.className = 'fh';
        h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        h.style.left = Math.random() * 100 + 'vw';
        h.style.bottom = '-40px';
        h.style.animationDelay = i * 0.2 + 's';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 4000);
    }
}

let intentos = 0;
const frases = ['No 🥺', '¿Segura? 😅', 'Piénsalo...', '¡Di que sí! 😩', '¡SÍIII! 💕'];
const tamaños = ['1rem', '0.85rem', '0.7rem', '0.55rem', '0rem'];

function escapar() {
    if (intentos >= 4) { mostrarCarta(); return; }
    const btn = document.getElementById('btnNo');
    const card = document.querySelector('.card');
    const cr = card.getBoundingClientRect();
    // Mover el botón a posición aleatoria dentro de la card
    const maxX = cr.width - 80;
    const maxY = cr.height - 50;
    btn.style.left = Math.random() * maxX + 'px';
    btn.style.top  = Math.random() * maxY + 'px';
    btn.textContent = frases[intentos];
    btn.style.fontSize = tamaños[intentos];
    intentos++;
}
</script>
</body>
</html>
